{% extends "_base.html" %}
{% block content %}
<h1>Documents (Factures / BC / BR / Autres)</h1>

<form method="post" action="/docs/upload" enctype="multipart/form-data" class="form">
  <label>Type</label>
  <select name="doc_type">
    <option>FACTURE</option>
    <option>BC</option>
    <option>BR</option>
    <option>RELEVE</option>
    <option selected>AUTRE</option>
  </select>
  <label>Fichier (PDF / image)</label>
  <input type="file" name="file" accept="image/*" capture="environment" required>
  <button class="btn" type="submit">Uploader</button>
</form>

<h2>Derniers documents</h2>
<ul>
  {% for d in docs %}
    <li>{{ d.created_at.strftime("%Y-%m-%d %H:%M") }} — <b>{{ d.doc_type }}</b> — {{ d.filename }}</li>
  {% else %}
    <li>Aucun document uploadé.</li>
  {% endfor %}
</ul>
{% endblock %}
